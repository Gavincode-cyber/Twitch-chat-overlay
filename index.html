<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Twitch Chat Overlay with 7TV</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="setup-container">
    <form id="username-form">
      <label for="username-input">Twitch Username:</label>
      <input type="text" id="username-input" placeholder="Enter Twitch username" required />
      <button type="submit">Start Overlay</button>
    </form>
  </div>
  <div id="chat-container" style="display:none;"></div>
  <script src="https://cdn.jsdelivr.net/npm/tmi.js@1.8.5/dist/tmi.min.js"></script>
  <script src="overlay.js"></script>
</body>
</html>
